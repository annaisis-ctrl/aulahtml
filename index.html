<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula Bootstrap</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="https://i.pinimg.com/474x/98/e1/f0/98e1f04d6ae6167b034bfe016dde8396.jpg" alt="Logo" width="30"
          height="24" class="d-inline-block align-text-top">
        Harry Potter
      </a>
    </div>
  </nav>

  <br><br>

  <div id="carouselExampleIndicators" class="carousel slide">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
        aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
        aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
        aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img
          src="https://rollingstone.com.br/wp-content/uploads/2024/02/roteirista-de-succession-pode-comandar-nova-adaptacao-de-harry-potter-foto-divulgacaowarner-bros-pictures.jpg" class="d-block w-100" alt="...">
      </div>
      <div class="carousel-item">
        <img
          src="https://img10.hotstar.com/image/upload/f_auto,q_auto/sources/r1/cms/prod/4197/1740399344197-i"
          class="d-block w-100" alt="...">
      </div>
      <div class="carousel-item">
        <img src="https://img10.hotstar.com/image/upload/f_auto,q_auto/sources/r1/cms/prod/161/1739444310161-i" class="d-block w-100"
          alt="...">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
      data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
      data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>

  <br><br>

  <div class="card" style="width: 18rem;">
    <img src="https://i.pinimg.com/originals/a3/ae/df/a3aedf15946cb4db3a67fff05176085d.png" class="card-img-top"
      alt="...">
    <div class="card-body">
      <p class="card-text">Some quick example text to build on the card title and make up the bulk of the cards content.
      </p>
    </div>
  </div>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
